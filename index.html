                let quizQuestions = [];
                
                if (selectedMode === 'trac-nghiem') {
                    quizQuestions = [...questionsData.tracNghiem].map(q => ({...q, type: 'tracNghiem'}));
                } else if (selectedMode === 'dung-sai') {
                    quizQuestions = [...questionsData.dungSai].map(q => ({...q, type: 'dungSai'}));
                } else if (selectedMode === 'tra-loi-ngan') {
                    quizQuestions = [...questionsData.traLoiNgan].map(q => ({...q, type: 'traLoiNgan'}));
                } else {
                    const all = [
                        ...questionsData.tracNghiem.map(q => ({...q, type: 'tracNghiem'})),
                        ...questionsData.dungSai.map(q => ({...q, type: 'dungSai'})),
                        ...questionsData.traLoiNgan.map(q => ({...q, type: 'traLoiNgan'}))
                    ];
                    quizQuestions = all;
                }
                
                quizQuestions = quizQuestions.sort(() => Math.random() - 0.5);
                
                setQuestions(quizQuestions);
                setMode(selectedMode);
                setCurrentIndex(0);
                setAnswers({});
                setSubmitted({});
                setShowResults(false);
                setScore(0);
            };

            const handleAnswer = (answer) => {
                if (submitted[currentIndex]) return;
                setAnswers({...answers, [currentIndex]: answer});
            };

            const submitAnswer = () => {
                if (submitted[currentIndex]) return;
                
                setSubmitted({...submitted, [currentIndex]: true});
                
                // Tạo hiệu ứng confetti nếu đúng
                const q = questions[currentIndex];
                let isCorrect = false;
                
                if (q.type === 'tracNghiem') {
                    isCorrect = answers[currentIndex] === q.correct;
                } else if (q.type === 'dungSai') {
                    isCorrect = answers[currentIndex] && JSON.stringify(answers[currentIndex]) === JSON.stringify(q.correct);
                } else if (q.type === 'traLoiNgan') {
                    const userAns = (answers[currentIndex] || []).join('');
                    isCorrect = userAns === q.correct;
                }
                
                if (isCorrect) {
                    createConfetti();
                }
            };

            const createConfetti = () => {
                const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#4caf50', '#ffd700'];
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti';
                        confetti.style.left = Math.random() * 100 + '%';
                        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                        confetti.style.animationDelay = Math.random() * 0.5 + 's';
                        document.body.appendChild(confetti);
                        setTimeout(() => confetti.remove(), 3000);
                    }, i * 30);
                }
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                }
            };

            const prevQuestion = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                }
            };

            const calculateScore = () => {
                let correct = 0;
                let total = questions.length;

                questions.forEach((q, idx) => {
                    const userAnswer = answers[idx];
                    
                    if (q.type === 'tracNghiem') {
                        if (userAnswer === q.correct) correct++;
                    } else if (q.type === 'dungSai') {
                        if (userAnswer && JSON.stringify(userAnswer) === JSON.stringify(q.correct)) {
                            correct++;
                        }
                    } else if (q.type === 'traLoiNgan') {
                        const userAns = (userAnswer || []).join('');
                        if (userAns === q.correct) {
                            correct++;
                        }
                    }
                });

                setScore(Math.round((correct / total) * 100));
                setShowResults(true);
                createConfetti();
            };

            const restart = () => {
                setMode(null);
                setCurrentIndex(0);
                setQuestions([]);
                setAnswers({});
                setSubmitted({});
                setShowResults(false);
                setScore(0);
            };

            const canSubmit = () => {
                const q = questions[currentIndex];
                const answer = answers[currentIndex];
                
                if (submitted[currentIndex]) return false;
                if (!answer) return false;
                
                if (q.type === 'tracNghiem') {
                    return answer !== undefined;
                } else if (q.type === 'dungSai') {
                    return answer && answer.length === 4;
                } else if (q.type === 'traLoiNgan') {
                    return answer && answer.some(val => val !== '');
                }
                return false;
            };

            const allQuestionsSubmitted = () => {
                return Object.keys(submitted).length === questions.length;
            };

            if (!mode) {
                return (
                    <div className="container">
                        <div className="header">
                            <h1>🎓 Quiz Vật Lý Lớp 10</h1>
                            <p>Giữa Kỳ II - Luyện Tập</p>
                        </div>
                        
                        <div className="mode-selector">
                            <h2>Chọn Chế Độ Chơi</h2>
                            <div className="mode-buttons">
                                <button className="mode-btn" onClick={() => startQuiz('trac-nghiem')}>
                                    📝 Trắc Nghiệm<br/>
                                    <small>30 câu - 4 lựa chọn</small>
                                </button>
                                <button className="mode-btn" onClick={() => startQuiz('dung-sai')}>
                                    ✓✗ Đúng - Sai<br/>
                                    <small>8 câu - 4 phương án</small>
                                </button>
                                <button className="mode-btn" onClick={() => startQuiz('tra-loi-ngan')}>
                                    ✏️ Trả Lời Ngắn<br/>
                                    <small>12 câu - Điền số</small>
                                </button>
                                <button className="mode-btn" onClick={() => startQuiz('tong-hop')}>
                                    🎯 Tổng Hợp<br/>
                                    <small>50 câu - Tất cả loại</small>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (showResults) {
                const percentage = score;
                let feedback = '';
                let feedbackClass = '';
                
                if (percentage >= 90) {
                    feedback = '🏆 Xuất sắc! Bạn đã nắm vững kiến thức!';
                    feedbackClass = 'excellent';
                } else if (percentage >= 70) {
                    feedback = '👍 Tốt lắm! Tiếp tục phát huy nhé!';
                    feedbackClass = 'good';
                } else if (percentage >= 50) {
                    feedback = '💪 Khá đấy! Cần ôn thêm một chút nữa!';
                    feedbackClass = 'average';
                } else {
                    feedback = '📚 Cần cố gắng thêm! Hãy ôn lại kiến thức nhé!';
                    feedbackClass = 'needs-improvement';
                }

                const correctCount = Math.round((percentage / 100) * questions.length);
                
                return (
                    <div className="container">
                        <div className="score-card">
                            <h2>🎉 Hoàn Thành Quiz!</h2>
                            <div className="score-display">{percentage}%</div>
                            
                            <div className="score-details">
                                <div className="score-item">
                                    <div className="label">Tổng Câu</div>
                                    <div className="value">{questions.length}</div>
                                </div>
                                <div className="score-item">
                                    <div className="label">Đúng</div>
                                    <div className="value">{correctCount}</div>
                                </div>
                                <div className="score-item">
                                    <div className="label">Sai</div>
                                    <div className="value">{questions.length - correctCount}</div>
                                </div>
                            </div>
                            
                            <div className={`feedback ${feedbackClass}`}>
                                {feedback}
                            </div>
                            
                            <div className="controls">
                                <button className="btn btn-primary" onClick={restart}>
                                    🏠 Về Trang Chủ
                                </button>
                                <button className="btn btn-secondary" onClick={() => {
                                    setShowResults(false);
                                    setCurrentIndex(0);
                                }}>
                                    📋 Xem Lại Đáp Án
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = questions[currentIndex];
            const userAnswer = answers[currentIndex];
            const progress = ((currentIndex + 1) / questions.length) * 100;

            return (
                <div className="container">
                    <div className="progress">
                        <div className="progress-bar" style={{width: `${progress}%`}}></div>
                    </div>
                    
                    <div className="quiz-card">
                        <div className="question-header">
                            <span className="question-number">
                                Câu {currentIndex + 1}/{questions.length}
                            </span>
                            <span className="question-type">
                                {currentQuestion.type === 'tracNghiem' && '📝 Trắc Nghiệm'}
                                {currentQuestion.type === 'dungSai' && '✓✗ Đúng - Sai'}
                                {currentQuestion.type === 'traLoiNgan' && '✏️ Trả Lời Ngắn'}
                            </span>
                        </div>
                        
                        <div className="question-text">
                            {currentQuestion.question}
                        </div>
                        
                        {currentQuestion.image && (
                            <img 
                                src={currentQuestion.image} 
                                alt="Hình minh họa" 
                                className="question-image"
                                onError={(e) => {
                                    e.target.style.display = 'none';
                                    console.log('Không tải được hình:', currentQuestion.image);
                                }}
                            />
                        )}
                        
                        {currentQuestion.type === 'tracNghiem' && (
                            <>
                                <div className="options">
                                    {currentQuestion.options.map((option, idx) => {
                                        const isSelected = userAnswer === idx;
                                        const isSubmitted = submitted[currentIndex];
                                        const isCorrect = idx === currentQuestion.correct;
                                        
                                        let className = 'option';
                                        if (isSelected && !isSubmitted) className += ' selected';
                                        if (isSubmitted) {
                                            className += ' disabled';
                                            if (isCorrect) className += ' correct';
                                            else if (isSelected) className += ' incorrect';
                                        }
                                        
                                        return (
                                            <div
                                                key={idx}
                                                className={className}
                                                onClick={() => !isSubmitted && handleAnswer(idx)}
                                            >
                                                {String.fromCharCode(65 + idx)}. {option}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {submitted[currentIndex] && (
                                    <div className={`feedback-message ${userAnswer === currentQuestion.correct ? 'correct' : 'incorrect'}`}>
                                        {userAnswer === currentQuestion.correct 
                                            ? '✅ Chính xác! Tuyệt vời!' 
                                            : `❌ Chưa đúng! Đáp án đúng là: ${String.fromCharCode(65 + currentQuestion.correct)}`
                                        }
                                    </div>
                                )}
                                
                                {!submitted[currentIndex] && userAnswer !== undefined && (
                                    <div className="controls">
                                        <button className="btn btn-success" onClick={submitAnswer}>
                                            ✓ Kiểm Tra Đáp Án
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                        
                        {currentQuestion.type === 'dungSai' && (
                            <>
                                <div className="true-false-grid">
                                    {currentQuestion.statements.map((statement, idx) => {
                                        const isSubmitted = submitted[currentIndex];
                                        const userChoice = userAnswer?.[idx];
                                        const correctChoice = currentQuestion.correct[idx];
                                        
                                        return (
                                            <div key={idx}>
                                                <div className="tf-statement">
                                                    {String.fromCharCode(97 + idx)}. {statement}
                                                </div>
                                                <div className="tf-buttons">
                                                    <button
                                                        className={`tf-btn ${
                                                            userChoice === true && !isSubmitted ? 'selected-true' : ''
                                                        } ${
                                                            isSubmitted && correctChoice === true ? 'correct' : ''
                                                        } ${
                                                            isSubmitted && userChoice === true && correctChoice === false ? 'incorrect' : ''
                                                        } ${isSubmitted ? 'disabled' : ''}`}
                                                        onClick={() => {
                                                            if (isSubmitted) return;
                                                            const newAnswer = [...(userAnswer || [false, false, false, false])];
                                                            newAnswer[idx] = true;
                                                            handleAnswer(newAnswer);
                                                        }}
                                                        disabled={isSubmitted}
                                                    >
                                                        ✓ Đúng
                                                    </button>
                                                    <button
                                                        className={`tf-btn ${
                                                            userChoice === false && !isSubmitted ? 'selected-false' : ''
                                                        } ${
                                                            isSubmitted && correctChoice === false ? 'correct' : ''
                                                        } ${
                                                            isSubmitted && userChoice === false && correctChoice === true ? 'incorrect' : ''
                                                        } ${isSubmitted ? 'disabled' : ''}`}
                                                        onClick={() => {
                                                            if (isSubmitted) return;
                                                            const newAnswer = [...(userAnswer || [false, false, false, false])];
                                                            newAnswer[idx] = false;
                                                            handleAnswer(newAnswer);
                                                        }}
                                                        disabled={isSubmitted}
                                                    >
                                                        ✗ Sai
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {submitted[currentIndex] && (
                                    <div className={`feedback-message ${
                                        JSON.stringify(userAnswer) === JSON.stringify(currentQuestion.correct) ? 'correct' : 'incorrect'
                                    }`}>
                                        {JSON.stringify(userAnswer) === JSON.stringify(currentQuestion.correct)
                                            ? '✅ Chính xác tất cả! Xuất sắc!'
                                            : '❌ Có phương án chưa đúng! Hãy xem lại đáp án đúng được highlight màu xanh.'
                                        }
                                    </div>
                                )}
                                
                                {!submitted[currentIndex] && userAnswer && userAnswer.length === 4 && (
                                    <div className="controls">
                                        <button className="btn btn-success" onClick={submitAnswer}>
                                            ✓ Kiểm Tra Đáp Án
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                        
                        {currentQuestion.type === 'traLoiNgan' && (
                            <div className="short-answer-container">
                                <div className="short-answer-inputs">
                                    {[0, 1, 2, 3].map((position) => {
                                        const isSubmitted = submitted[currentIndex];
                                        const currentAnswer = userAnswer || ['', '', '', ''];
                                        const fullAnswer = currentAnswer.join('');
                                        const isCorrect = fullAnswer === currentQuestion.correct;
                                        
                                        return (
                                            <input
                                                key={position}
                                                type="text"
                                                className={`answer-input ${
                                                    isSubmitted ? (isCorrect ? 'correct' : 'incorrect') : ''
                                                } ${isSubmitted ? 'disabled' : ''}`}
                                                placeholder="?"
                                                value={currentAnswer[position] || ''}
                                                maxLength={1}
                                                onChange={(e) => {
                                                    if (isSubmitted) return;
                                                    const value = e.target.value;
                                                    if (/^[-,0-9]?$/.test(value)) {
                                                        const newAnswer = [...currentAnswer];
                                                        newAnswer[position] = value;
                                                        handleAnswer(newAnswer);
                                                        
                                                        // Auto focus next input
                                                        if (value && position < 3) {
                                                            const nextInput = e.target.parentElement.children[position + 1];
                                                            if (nextInput) nextInput.focus();
                                                        }
                                                    }
                                                }}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Backspace' && !currentAnswer[position] && position > 0) {
                                                        const prevInput = e.target.parentElement.children[position - 1];
                                                        if (prevInput) prevInput.focus();
                                                    }
                                                }}
                                                disabled={isSubmitted}
                                            />
                                        );
                                    })}
                                </div>
                                
                                <div className="short-answer-hint">
                                    💡 Nhập từng số/ký tự vào mỗi ô (có thể dùng dấu trừ "-" và dấu phẩy ",")
                                </div>
                                
                                {currentQuestion.unit && (
                                    <div className="short-answer-unit">
                                        Đơn vị: {currentQuestion.unit}
                                    </div>
                                )}
                                
                                {submitted[currentIndex] && (
                                    <>
                                        <div className={`feedback-message ${
                                            (userAnswer || []).join('') === currentQuestion.correct ? 'correct' : 'incorrect'
                                        }`}>
                                            {(userAnswer || []).join('') === currentQuestion.correct
                                                ? '✅ Chính xác! Tuyệt vời!'
                                                : `❌ Chưa đúng!`
                                            }
                                        </div>
                                        {(userAnswer || []).join('') !== currentQuestion.correct && (
                                            <div className="correct-answer-display">
                                                Đáp án đúng: {currentQuestion.correct} {currentQuestion.unit}
                                            </div>
                                        )}
                                    </>
                                )}
                                
                                {!submitted[currentIndex] && userAnswer && userAnswer.some(val => val !== '') && (
                                    <div className="controls">
                                        <button className="btn btn-success" onClick={submitAnswer}>
                                            ✓ Kiểm Tra Đáp Án
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        <div className="controls">
                            <button 
                                className="btn btn-secondary" 
                                onClick={prevQuestion}
                                disabled={currentIndex === 0}
                            >
                                ← Câu Trước
                            </button>
                            
                            {currentIndex < questions.length - 1 ? (
                                <button className="btn btn-primary" onClick={nextQuestion}>
                                    Câu Sau →
                                </button>
                            ) : (
                                <button 
                                    className="btn btn-success" 
                                    onClick={calculateScore}
                                    disabled={!allQuestionsSubmitted()}
                                >
                                    {allQuestionsSubmitted() ? '🎯 Xem Kết Quả' : '⏳ Hoàn thành tất cả câu'}
                                </button>
                            )}
                        </div>
                        
                        {submitted[currentIndex] && (
                            <div className="answered-badge">
                                ✓ Đã trả lời
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
    </script>
</body>
</html>
